<template>
    <div class="fp">
        <nav class="fp-rail">
            <template for:each={tabs} for:item="t">
                <button
                    key={t.key}
                    type="button"
                    class={t.cls}
                    data-tab={t.key}
                    title={t.label}
                    onclick={handleTab}
                >
                    <lightning-icon
                        icon-name={t.icon}
                        size="x-small"
                    ></lightning-icon>
                    <span class="fp-tab-label">{t.label}</span>
                </button>
            </template>
        </nav>

        <div class="fp-main">
            <template lwc:if={isFields}>
                <template lwc:if={noObject}>
                    <p class="fp-note">
                        This form has no target object yet, so there are no
                        fields to offer.
                    </p>
                </template>
                <template lwc:else>
                    <header class="fp-head">
                        <span class="fp-head-label">{fieldsHeading}</span>
                        <span class="fp-head-sub">primary object</span>
                    </header>
                    <input
                        type="search"
                        class="fp-search"
                        placeholder="Search fields…"
                        value={search}
                        oninput={handleSearch}
                    />
                    <template lwc:if={error}>
                        <p class="fp-error" role="alert">{error}</p>
                    </template>
                    <template lwc:elseif={rows}>
                        <template lwc:if={empty}>
                            <p class="fp-note">No fields match.</p>
                        </template>
                        <ul class="fp-list">
                            <template for:each={rows} for:item="f">
                                <li key={f.apiName}>
                                    <button
                                        type="button"
                                        class={f.cls}
                                        title={f.title}
                                        data-api={f.apiName}
                                        draggable="true"
                                        onclick={handleAdd}
                                        ondragstart={handleDragStart}
                                    >
                                        <span class="fp-label">
                                            <template lwc:if={f.required}>
                                                <abbr
                                                    class="fp-req"
                                                    title="required"
                                                    >*</abbr
                                                >
                                            </template>
                                            {f.label}
                                        </span>
                                        <span class="fp-type"
                                            >{f.inputType}</span
                                        >
                                        <template lwc:if={f.added}>
                                            <span class="fp-added">ADDED</span>
                                        </template>
                                    </button>
                                </li>
                            </template>
                        </ul>
                    </template>
                    <template lwc:else>
                        <lightning-spinner
                            alternative-text="Loading fields"
                            size="small"
                        ></lightning-spinner>
                    </template>
                </template>
            </template>
            <template lwc:elseif={isBlocks}>
                <header class="fp-head">
                    <span class="fp-head-label">Content blocks</span>
                    <span class="fp-head-sub"
                        >drop into sections or between them</span
                    >
                </header>
                <ul class="fp-list">
                    <template for:each={blocks} for:item="b">
                        <li key={b.type}>
                            <button
                                type="button"
                                class="fp-item"
                                title={b.title}
                                data-type={b.type}
                                draggable="true"
                                onclick={handleAddBlock}
                                ondragstart={handleBlockDragStart}
                            >
                                <lightning-icon
                                    icon-name={b.icon}
                                    size="x-small"
                                ></lightning-icon>
                                <span class="fp-label">{b.label}</span>
                            </button>
                        </li>
                    </template>
                </ul>
                <p class="fp-note fp-note-sub">
                    Blocks repeat freely — drag as many as you need. The
                    Repeating Group joins them with the properties slice.
                </p>
            </template>
            <template lwc:elseif={isStub}>
                <p class="fp-note">{stubLabel}</p>
            </template>
        </div>
    </div>
</template>
