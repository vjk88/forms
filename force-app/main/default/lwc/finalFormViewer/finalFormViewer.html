<template>
  <template lwc:if={error}>
    <div class="viewer-error" role="alert">{error}</div>
  </template>
  <template lwc:elseif={model}>
    <c-final-page-frame
      tokens={tokens}
      max-width={model.maxWidth}
      bleed={model.bleed}
    >
      <template lwc:if={model.header}>
        <c-final-form-header
          slot="header"
          header={model.header}
        ></c-final-form-header>
      </template>
      <div slot="body">
        <template lwc:if={navCtor}>
          <lwc:component
            lwc:is={navCtor}
            pages={model.pages}
            current-page-index={pageIndex}
            page-validity={pageValidity}
            options={model.layoutOptions}
            lockup={model.paneLockup}
            onpagechange={handlePageChange}
          >
            <!-- Slotted from the engine's template: button intents
                             never cross the primitive's shadow boundary. -->
            <c-final-submit-bar
              slot="actions"
              config={model.submit}
              show-back={showBack}
              show-next={showNext}
              show-submit={showSubmit}
              onback={handleBack}
              onnext={handleNext}
              onsubmit={handleSubmit}
            ></c-final-submit-bar>
          </lwc:component>
        </template>
      </div>
    </c-final-page-frame>
  </template>
  <template lwc:else>
    <div class="viewer-loading">
      <lightning-spinner
        alternative-text="Loading form"
        size="medium"
      ></lightning-spinner>
    </div>
  </template>
</template>
