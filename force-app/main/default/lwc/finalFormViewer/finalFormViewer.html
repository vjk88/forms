<template>
    <template lwc:if={error}>
        <div class="viewer-error" role="alert">{error}</div>
    </template>
    <template lwc:elseif={model}>
        <c-final-page-frame tokens={tokens} max-width={model.maxWidth}>
            <template lwc:if={model.header}>
                <c-final-form-header
                    slot="header"
                    header={model.header}
                ></c-final-form-header>
            </template>
            <div slot="body">
                <template lwc:if={navCtor}>
                    <lwc:component
                        lwc:is={navCtor}
                        pages={model.pages}
                    ></lwc:component>
                </template>
            </div>
            <c-final-submit-bar
                slot="actions"
                config={model.submit}
                show-submit={model.showSubmit}
                onsubmit={handleSubmit}
            ></c-final-submit-bar>
        </c-final-page-frame>
    </template>
    <template lwc:else>
        <div class="viewer-loading">
            <lightning-spinner
                alternative-text="Loading form"
                size="medium"
            ></lightning-spinner>
        </div>
    </template>
</template>
