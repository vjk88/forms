<template>
  <div class="builder-container">
    <!-- Primary tabs: Forms / Surveys -->
    <div class="primary-tabs">
      <button type="button" class={formsTabClass}
        data-tab="forms" onclick={handlePrimaryTabChange}>
        <lightning-icon icon-name="utility:form" size="x-small"
          class="slds-m-right_x-small"></lightning-icon>
        Forms
      </button>
      <button type="button" class={surveysTabClass}
        data-tab="surveys" onclick={handlePrimaryTabChange}>
        <lightning-icon icon-name="utility:survey" size="x-small"
          class="slds-m-right_x-small"></lightning-icon>
        Surveys
      </button>
    </div>

    <!-- Header Bar -->
    <div class="slds-page-header slds-m-bottom_small" role="banner">
      <div class="slds-page-header__row">
        <div class="slds-page-header__col-actions">
          <div class="slds-page-header__controls">
            <!-- Form Selector -->
            <div class="slds-page-header__control">
              <lightning-combobox
                name="formSelector"
                label="Select Form"
                value={selectedFormId}
                placeholder="Choose a form"
                options={formOptions}
                onchange={handleFormSelect}
                variant="label-hidden"
              >
              </lightning-combobox>
            </div>

            <!-- New Form Button -->
            <div class="slds-page-header__control">
              <lightning-button
                variant="neutral"
                label={newButtonLabel}
                icon-name="utility:add"
                onclick={handleNewForm}
              >
              </lightning-button>
            </div>

            <!-- Version Selector -->
            <template if:true={hasFormSelected}>
              <div class="slds-page-header__control">
                <lightning-combobox
                  name="versionSelector"
                  label="Select Version"
                  value={selectedVersionId}
                  placeholder="Choose version"
                  options={versionOptions}
                  onchange={handleVersionSelect}
                  variant="label-hidden"
                >
                </lightning-combobox>
              </div>

              <!-- Create Draft Button -->
              <div class="slds-page-header__control">
                <lightning-button
                  variant="neutral"
                  label="New Draft"
                  icon-name="utility:copy"
                  onclick={handleCreateDraft}
                  disabled={createDraftDisabled}
                  title={createDraftTooltip}
                >
                </lightning-button>
              </div>
            </template>

            <!-- Action Buttons -->
            <template if:true={hasVersionSelected}>
              <div class="slds-page-header__control">
                <lightning-button-group>
                  <lightning-button
                    variant="neutral"
                    label="Preview"
                    icon-name="utility:preview"
                    onclick={handlePreview}
                  >
                  </lightning-button>
                  <template if:true={isDraft}>
                    <lightning-button
                      variant="brand"
                      label="Publish"
                      icon-name="utility:check"
                      onclick={handlePublish}
                      disabled={isProcessing}
                    >
                    </lightning-button>
                    <lightning-button
                      variant="destructive"
                      label="Delete"
                      icon-name="utility:delete"
                      onclick={handleDeleteVersion}
                      disabled={isProcessing}
                    >
                    </lightning-button>
                  </template>
                </lightning-button-group>
              </div>
            </template>
          </div>
        </div>
      </div>

      <!-- Status Badge Row -->
      <template if:true={hasVersionSelected}>
        <div class="slds-page-header__row slds-m-top_xx-small">
          <div
            class="slds-page-header__col-title slds-grid slds-grid_vertical-align-center"
          >
            <lightning-badge
              label={versionStatusLabel}
              class={versionBadgeClass}
            >
            </lightning-badge>
            <span
              class="slds-m-left_small slds-text-body_small slds-text-color_weak"
            >
              {formDetailText}
            </span>
          </div>
        </div>
      </template>
    </div>

    <!-- Builder Body: 3-column layout -->
    <template if:true={hasVersionSelected}>
      <div class="designer-body">
        <!-- Left: Field Palette -->
        <div class="designer-left">
          <c-field-palette
            object-label={currentObjectLabel}
            fields={objectFields}
            relationships={childRelationships}
            related-object-fields={relatedObjectFields}
            related-object-label={relatedObjectLabel}
            selected-section-context={selectedSectionContext}
            mode={primaryTab}
          >
          </c-field-palette>
        </div>

        <!-- Center: Canvas -->
        <div class="designer-center">
          <c-designer-canvas
            section-data={canvasSections}
            is-editable={isDraft}
            layout-mode={currentLayoutMode}
            relationships={childRelationships}
            header-data={formHeader}
            is-header-selected={isHeaderSelected}
            onselectheader={handleSelectHeader}
            onaddsection={handleAddSection}
            onaddrelatedtosection={handleAddRelatedToSection}
            onselectsection={handleSelectSection}
            oneditsection={handleEditSection}
            ondeletesection={handleDeleteSection}
            ondeleterelatedsection={handleDeleteRelatedSection}
            onselectelement={handleSelectElement}
            onselectrelatedsection={handleSelectRelatedSection}
            onselectrelatedelement={handleSelectRelatedElement}
            onremoveelement={handleRemoveElement}
            onremoverelatedelement={handleRemoveRelatedElement}
            ondropfield={handleDropField}
            ondropcomponent={handleDropComponent}
            ondroprelatefield={handleDropRelateField}
          >
          </c-designer-canvas>
        </div>

        <!-- Right: Property Panel -->
        <div class="designer-right">
          <c-property-panel
            selection={panelSelection}
            onpropertychange={handlePropertyChange}
            oneditvisibility={handleEditVisibility}
          >
          </c-property-panel>
        </div>
      </div>
    </template>

    <!-- Empty State -->
    <template if:false={hasFormSelected}>
      <div
        class="slds-box slds-theme_default slds-text-align_center slds-p-around_xx-large"
      >
        <lightning-icon
          icon-name="utility:form"
          size="large"
          class="slds-m-bottom_medium"
        ></lightning-icon>
        <h2 class="slds-text-heading_medium slds-m-bottom_small">
          {emptyStateTitle}
        </h2>
        <p class="slds-text-body_regular slds-text-color_weak">
          {emptyStateMessage}
        </p>
      </div>
    </template>
  </div>

  <!-- Create Form Modal -->
  <template if:true={showCreateModal}>
    <c-new-form-dialog
      object-options={objectOptions}
      initial-mode={primaryTab}
      onclose={handleCloseModal}
      onformcreated={handleFormCreated}
    >
    </c-new-form-dialog>
  </template>

  <!-- Spinners -->
  <template if:true={isProcessing}>
    <lightning-spinner alternative-text="Processing..." size="medium">
    </lightning-spinner>
  </template>
</template>
