<template>
    <template lwc:if={isField}>
        <div class={fieldClass}>
            <!--
                Custom themeable label (native field is label-hidden and keeps
                its own assistive label — SR announces the field exactly once).
                Only the label TEXT is aria-hidden; helptext is a perceivable
                sibling so its button never sits inside a hidden region.
            -->
            <template lwc:if={showCustomLabel}>
                <div class="field-label-row">
                    <label
                        class={labelClass}
                        aria-hidden="true"
                        onclick={handleLabelClick}
                    >
                        <template lwc:if={el.required}>
                            <abbr class="field-req" title="required">*</abbr>
                        </template>
                        {el.label}
                    </label>
                    <template lwc:if={el.help}>
                        <lightning-helptext
                            content={el.help}
                        ></lightning-helptext>
                    </template>
                </div>
            </template>

            <template lwc:if={isTextarea}>
                <lightning-textarea
                    label={el.label}
                    placeholder={el.placeholder}
                    required={el.required}
                    disabled={el.disabled}
                    read-only={el.readOnly}
                    field-level-help={nativeHelp}
                    variant="label-hidden"
                    onchange={handleChange}
                ></lightning-textarea>
            </template>
            <template lwc:else>
                <lightning-input
                    type={inputType}
                    label={el.label}
                    placeholder={el.placeholder}
                    required={el.required}
                    disabled={el.disabled}
                    read-only={el.readOnly}
                    field-level-help={nativeHelp}
                    variant="label-hidden"
                    onchange={handleChange}
                ></lightning-input>
            </template>
        </div>
    </template>
    <template lwc:elseif={isRichText}>
        <div class="block-richtext">
            <lightning-formatted-rich-text
                value={richTextHtml}
            ></lightning-formatted-rich-text>
        </div>
    </template>
    <template lwc:elseif={isImage}>
        <template lwc:if={hasImageSrc}>
            <img class="block-image" src={cfg.src} alt={imageAlt} />
        </template>
        <template lwc:else>
            <!-- src arrives with the properties slice — an honest frame
                 beats an invisible element the author can't find -->
            <div class="block-image-empty">
                <lightning-icon
                    icon-name="utility:image"
                    size="small"
                ></lightning-icon>
                <span>Image — pick a file in its properties</span>
            </div>
        </template>
    </template>
    <template lwc:elseif={isDivider}>
        <hr class="block-divider" />
    </template>
    <template lwc:elseif={isSpacer}>
        <div class="block-spacer" style={spacerStyle} aria-hidden="true"></div>
    </template>
    <template lwc:else>
        <div class="unsupported">
            <lightning-icon
                icon-name="utility:puzzle"
                size="x-small"
            ></lightning-icon>
            <span>This element type isn&#8217;t supported yet.</span>
        </div>
    </template>
</template>
