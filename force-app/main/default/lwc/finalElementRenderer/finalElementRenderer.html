<template>
    <template lwc:if={isField}>
        <div class="field">
            <!-- Custom themeable label (native field is label-hidden). -->
            <template lwc:if={showCustomLabel}>
                <label class="field-label" aria-hidden="true">
                    <template lwc:if={el.required}>
                        <abbr class="field-req" title="required">*</abbr>
                    </template>
                    {el.label}
                    <template lwc:if={el.help}>
                        <lightning-helptext
                            content={el.help}
                        ></lightning-helptext>
                    </template>
                </label>
            </template>

            <template lwc:if={isTextarea}>
                <lightning-textarea
                    label={el.label}
                    placeholder={el.placeholder}
                    required={el.required}
                    disabled={el.disabled}
                    read-only={el.readOnly}
                    field-level-help={nativeHelp}
                    variant="label-hidden"
                    onchange={handleChange}
                ></lightning-textarea>
            </template>
            <template lwc:else>
                <lightning-input
                    type={inputType}
                    label={el.label}
                    placeholder={el.placeholder}
                    required={el.required}
                    disabled={el.disabled}
                    read-only={el.readOnly}
                    field-level-help={nativeHelp}
                    variant="label-hidden"
                    onchange={handleChange}
                ></lightning-input>
            </template>
        </div>
    </template>
    <template lwc:else>
        <div class="unsupported">
            <lightning-icon
                icon-name="utility:puzzle"
                size="x-small"
            ></lightning-icon>
            <span>This element type isn&#8217;t supported yet.</span>
        </div>
    </template>
</template>
