<template>
  <div class="completion-card">
    <div class="completion-badge">
      <lightning-icon icon-name="utility:edit" size="xx-small"
        class="slds-m-right_xx-small badge-icon"></lightning-icon>
      Configuring State
    </div>

    <div class="completion-head">
      <lightning-icon icon-name="utility:success" size="small"
        class="head-icon slds-m-right_small"></lightning-icon>
      <div>
        <h2 class="completion-title">Completion Experience</h2>
        <p class="completion-sub">
          Configure what happens after a user successfully submits the form.
        </p>
      </div>
    </div>

    <!-- After-submit mode -->
    <div class="field-block">
      <lightning-radio-group
        label="After Submit"
        options={modeOptions}
        value={afterSubmitMode}
        type="radio"
        onchange={handleModeChange}>
      </lightning-radio-group>
    </div>

    <!-- ===== Toast & go mode ===== -->
    <template if:true={isToastMode}>
      <div class="mode-panel">
        <p class="hint slds-m-bottom_small">
          On submit, a success toast ("Record created / updated") appears and the
          user is taken straight to the destination below.
        </p>

        <div class="field-block">
          <lightning-combobox
            label="Go to"
            options={destinationOptions}
            value={toastTarget}
            onchange={handleToastTarget}>
          </lightning-combobox>
        </div>

        <template if:true={toastIsCustom}>
          <div class="field-block">
            <lightning-input
              type="url"
              label="Custom URL"
              value={toastUrl}
              placeholder="https://example.com/path or /lightning/..."
              field-level-help={tokenHint}
              onchange={handleToastUrl}>
            </lightning-input>
          </div>
        </template>
      </div>
    </template>

    <!-- ===== Completion screen mode ===== -->
    <template if:true={isScreenMode}>
      <div class="mode-panel">
        <!-- Thank-you message -->
        <div class="field-block">
          <label class="field-label">Thank You Message</label>
          <lightning-input-rich-text
            value={settings.thankYouMessage}
            placeholder="Thank you for your submission!"
            onchange={handleThankYou}>
          </lightning-input-rich-text>
        </div>

        <!-- Auto-redirect -->
        <div class="redirect-toggle-box field-block">
          <div class="toggle-line">
            <span class="field-label">Auto-Redirect</span>
            <lightning-input type="toggle" variant="label-hidden"
              checked={autoRedirect}
              message-toggle-active=""
              message-toggle-inactive=""
              onchange={handleAutoRedirect}>
            </lightning-input>
          </div>
          <p class="hint">Send the user onward automatically after submission.</p>

          <template if:true={autoRedirect}>
            <div class="indent">
              <lightning-combobox
                label="Redirect to"
                options={destinationOptions}
                value={redirectTarget}
                onchange={handleRedirectTarget}
                class="slds-m-bottom_small">
              </lightning-combobox>

              <template if:true={redirectIsCustom}>
                <lightning-input
                  type="url"
                  label="Custom URL"
                  value={redirectUrl}
                  placeholder="https://example.com/path"
                  field-level-help={tokenHint}
                  onchange={handleRedirectUrl}
                  class="slds-m-bottom_small">
                </lightning-input>
              </template>

              <lightning-input
                type="number"
                min="0"
                label="Redirect Delay (seconds)"
                value={redirectDelay}
                onchange={handleDelay}>
              </lightning-input>
            </div>
          </template>
        </div>

        <!-- Action button -->
        <div class="redirect-toggle-box field-block">
          <div class="toggle-line">
            <span class="field-label">Action Button</span>
            <lightning-input type="toggle" variant="label-hidden"
              checked={showActionButton}
              message-toggle-active=""
              message-toggle-inactive=""
              onchange={handleShowAction}>
            </lightning-input>
          </div>
          <p class="hint">Show a button below the message that takes the user somewhere.</p>

          <template if:true={showActionButton}>
            <div class="indent">
              <lightning-input
                label="Button Label"
                value={actionButtonLabel}
                onchange={handleActionLabel}
                class="slds-m-bottom_small">
              </lightning-input>

              <lightning-combobox
                label="Goes to"
                options={destinationOptions}
                value={actionTarget}
                onchange={handleActionTarget}
                class="slds-m-bottom_small">
              </lightning-combobox>

              <template if:true={actionIsCustom}>
                <lightning-input
                  type="url"
                  label="Custom URL"
                  value={actionUrl}
                  placeholder="https://example.com/path"
                  field-level-help={tokenHint}
                  onchange={handleActionUrl}>
                </lightning-input>
              </template>
            </div>
          </template>
        </div>
      </div>
    </template>
  </div>
</template>
