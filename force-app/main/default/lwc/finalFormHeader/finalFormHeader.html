<template>
    <header class={rootClass} style={surfaceStyle}>
        <template lwc:if={showLogo}>
            <img class="brand-logo" src={logoUrl} alt={logoAlt} />
        </template>
        <template lwc:elseif={showWordmark}>
            <div class="brand-wordmark">{hdr.brandName}</div>
        </template>
        <div class="lockup-text">
            <template lwc:if={hdr.title}>
                <h1 class="hdr-title">
                    <lightning-formatted-rich-text
                        value={hdr.title}
                    ></lightning-formatted-rich-text>
                </h1>
            </template>
            <template lwc:if={hdr.description}>
                <!-- div, not p: rich text arrives wrapped in its own <p> -->
                <div class="hdr-desc">
                    <lightning-formatted-rich-text
                        value={hdr.description}
                    ></lightning-formatted-rich-text>
                </div>
            </template>
        </div>
        <template lwc:if={highlight}>
            <c-final-form-highlight
                class="hdr-highlight"
                highlight={highlight}
            ></c-final-form-highlight>
        </template>
    </header>
</template>
