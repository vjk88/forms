<template>
    <div class={layoutClass}>
        <!-- Sticky brand panel -->
        <aside class="panel" style={panelStyle}>
            <div class="panel-inner">
                <c-form-highlight lwc:if={headerOn} message={model.header.highlight} variant="banner"></c-form-highlight>
                <span lwc:if={showLogo} class="panel-logo">
                    <img src={model.header.logo} alt="" />
                </span>
                <div class="panel-body">
                    <p lwc:if={showTitle} class="panel-title">{model.header.title}</p>
                    <p lwc:if={showDesc} class="panel-desc">{model.header.description}</p>
                </div>
                <!-- Submit inside brand panel (desktop only, hidden on mobile container query) -->
                <div lwc:if={isBrandSubmit} class="panel-submit">
                    <button lwc:if={showBack} type="button" class="btn-brand-back" onclick={fireBack}><span aria-hidden="true">←&nbsp;</span>{model.labels.back}</button>
                    <button lwc:if={showNext} type="button" class="btn-brand-next" onclick={fireNext}>{model.labels.next}<span aria-hidden="true">&nbsp;→</span></button>
                    <button lwc:if={showSubmit} type="button" class="submit-btn" onclick={fireSubmit}>{model.labels.submit}</button>
                </div>
            </div>
        </aside>
        <!-- Scrolling form pane (owns navigation via the shared c/formNav) -->
        <div class="pane">
            <c-form-nav
                lwc:if={showNavBar}
                pages={model.pages}
                nav={nav}
                display-mode={navDisplay}
                clickable={navClickable}
                labels={model.labels}
                onnavrequest={handleChildNav}
            ></c-form-nav>
            <template for:each={panePages} for:item="page">
                <div key={page.pageKey} class="page">
                    <c-layout-zones
                        zones={page.zones}
                        mode={mode}>
                    </c-layout-zones>
                </div>
            </template>
            <div class={submitClass}>
                <button lwc:if={showBack} type="button" class="btn-ghost" onclick={fireBack}><span aria-hidden="true">←&nbsp;</span>{model.labels.back}</button>
                <button lwc:if={showNext} type="button" class="btn-primary" onclick={fireNext}>{model.labels.next}<span aria-hidden="true">&nbsp;→</span></button>
                <button lwc:if={showSubmit} type="button" class="submit-btn" onclick={fireSubmit}>{model.labels.submit}</button>
            </div>
        </div>
    </div>
</template>
