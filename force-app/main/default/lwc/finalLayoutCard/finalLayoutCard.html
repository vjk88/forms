<template>
    <div
        class={rootClass}
        role="button"
        tabindex="0"
        aria-pressed={pressed}
        aria-label={meta.label}
        onclick={handleClick}
        onkeydown={handleKey}
    >
        <!-- Theme-tinted structural mockup (layoutThumb treatment, --c-* driven) -->
        <div class="lc-diagram" style={tokenStyle}>
            <div class="lt-stage">
                <!-- Scroll: header strip + field lines + button -->
                <template lwc:if={isScroll}>
                    <div class="lt-card">
                        <div class="lt-strip"></div>
                        <div class="lt-line"></div>
                        <div class="lt-line s"></div>
                        <div class="lt-line"></div>
                        <div class="lt-btn"></div>
                    </div>
                </template>

                <!-- Stepper: step rail across the top, then body -->
                <template lwc:elseif={isStepper}>
                    <div class="lt-card pad0">
                        <div class="lt-stepper-top">
                            <span class="lt-dot on"></span>
                            <span class="lt-bar"></span>
                            <span class="lt-dot"></span>
                            <span class="lt-bar"></span>
                            <span class="lt-dot"></span>
                        </div>
                        <div class="lt-body">
                            <div class="lt-line"></div>
                            <div class="lt-line s"></div>
                            <div class="lt-btn"></div>
                        </div>
                    </div>
                </template>

                <!-- Tabs: tab strip on top of the card -->
                <template lwc:elseif={isTabs}>
                    <div class="lt-card pad0">
                        <div class="lt-tabs">
                            <span class="lt-tab on"></span>
                            <span class="lt-tab"></span>
                            <span class="lt-tab"></span>
                        </div>
                        <div class="lt-body">
                            <div class="lt-line"></div>
                            <div class="lt-line s"></div>
                            <div class="lt-btn"></div>
                        </div>
                    </div>
                </template>

                <!-- Accordion: first row expanded, two collapsed -->
                <template lwc:elseif={isAccordion}>
                    <div class="lt-card pad-sm">
                        <div class="lt-acc-row open">
                            <span class="lt-acc-head on"></span>
                            <div class="lt-line"></div>
                            <div class="lt-line s"></div>
                        </div>
                        <div class="lt-acc-row"><span class="lt-acc-head"></span></div>
                        <div class="lt-acc-row"><span class="lt-acc-head"></span></div>
                    </div>
                </template>

                <!-- Rail: vertical nav rail beside the form -->
                <template lwc:elseif={isRail}>
                    <div class="lt-split">
                        <div class="lt-rail">
                            <span class="lt-dot on"></span>
                            <span class="lt-dot"></span>
                            <span class="lt-dot"></span>
                        </div>
                        <div class="lt-card flush">
                            <div class="lt-line"></div>
                            <div class="lt-line s"></div>
                            <div class="lt-btn"></div>
                        </div>
                    </div>
                </template>

                <!-- One at a time: page bg + progress + one floating question -->
                <template lwc:elseif={isOneAtATime}>
                    <div class="lt-card center">
                        <div class="lt-progress"><span class="lt-progress-fill"></span></div>
                        <div class="lt-line lg"></div>
                        <div class="lt-line s"></div>
                        <div class="lt-btn"></div>
                    </div>
                </template>

                <!-- Split hero: brand panel beside the form -->
                <template lwc:elseif={isSplit}>
                    <div class="lt-split">
                        <div class="lt-panel">
                            <span class="lt-panel-line"></span>
                            <span class="lt-panel-line s"></span>
                        </div>
                        <div class="lt-card flush">
                            <div class="lt-line"></div>
                            <div class="lt-line s"></div>
                            <div class="lt-btn"></div>
                        </div>
                    </div>
                </template>

                <!-- Split hero · Conversational: brand panel + one question -->
                <template lwc:elseif={isSplitOne}>
                    <div class="lt-split">
                        <div class="lt-panel">
                            <span class="lt-panel-line"></span>
                            <span class="lt-panel-line s"></span>
                        </div>
                        <div class="lt-card flush center-v">
                            <div class="lt-progress"><span class="lt-progress-fill"></span></div>
                            <div class="lt-line lg"></div>
                            <div class="lt-btn"></div>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <div class="lc-meta">
            <div class="lc-top">
                <lightning-icon
                    icon-name="utility:layout"
                    size="x-small"
                    class="lc-icon"
                ></lightning-icon>
                <span class="lc-name">{meta.label}</span>
                <lightning-icon
                    lwc:if={selected}
                    icon-name="utility:check"
                    size="xx-small"
                    class="lc-check"
                ></lightning-icon>
            </div>
            <p class="lc-hint">{meta.hint}</p>
        </div>
    </div>
</template>
