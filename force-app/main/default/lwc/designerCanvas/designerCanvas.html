<template>
  <div class="canvas-container">
    <div class="canvas-scroll">
    <div class="canvas-main">

      <!-- Sections -->
      <template for:each={sections} for:item="section" for:index="idx">
        <div key={section.id} class={section.cardClass} data-index={idx}
            draggable="true"
            onclick={handleSectionClick}
            ondragstart={handleSectionDragStart}
            ondragover={handleSectionDragOver}
            ondrop={handleSectionDrop}>

          <!-- Section Header (conditional) -->
          <template if:true={section.showHeader}>
            <div class="section-header" style={section.headerStyle}>
              <div class="section-header-left">
                <lightning-icon icon-name="utility:drag_and_drop" size="xx-small"
                  class="drag-handle slds-m-right_xx-small"
                  alternative-text="Drag"></lightning-icon>
                <template if:true={section.icon}>
                  <lightning-icon icon-name={section.icon} size="x-small"
                    class="section-icon slds-m-right_xx-small"></lightning-icon>
                </template>
                <span class="section-title">{section.name}</span>
                <template if:true={section.isRepeatable}>
                  <lightning-badge label="Repeater" class="slds-m-left_xx-small">
                  </lightning-badge>
                </template>
                <template if:true={section.repeaterInfo}>
                  <span class="section-via">{section.repeaterInfo}</span>
                </template>
              </div>
              <div class="section-header-right">
                <lightning-button-icon icon-name="utility:settings" variant="bare"
                  size="small" alternative-text="Section settings"
                  data-index={idx} onclick={handleSectionSettings}>
                </lightning-button-icon>
                <lightning-button-icon icon-name="utility:delete" variant="bare"
                  size="small" alternative-text="Delete section"
                  data-index={idx} onclick={handleDeleteSection}>
                </lightning-button-icon>
              </div>
            </div>
          </template>

          <!-- Headerless section — minimal toolbar -->
          <template if:false={section.showHeader}>
            <div class="section-toolbar">
              <lightning-icon icon-name="utility:drag_and_drop" size="xx-small"
                class="drag-handle" alternative-text="Drag"></lightning-icon>
              <lightning-button-icon icon-name="utility:settings" variant="bare"
                size="small" alternative-text="Section settings"
                data-index={idx} onclick={handleSectionSettings}>
              </lightning-button-icon>
              <lightning-button-icon icon-name="utility:delete" variant="bare"
                size="small" alternative-text="Delete section"
                data-index={idx} onclick={handleDeleteSection}>
              </lightning-button-icon>
            </div>
          </template>

          <!-- Elements -->
          <div class={section.bodyClass} data-section-index={idx}
              ondragover={handleElementDragOver}
              ondrop={handleElementDrop}>

            <template if:true={section.hasElements}>
              <div class="slds-grid slds-wrap slds-gutters_x-small">
                <template for:each={section.elements} for:item="element"
                    for:index="elIdx">
                  <div key={element.id} class={element.gridItemClass}
                      draggable="true"
                      data-section-index={idx} data-element-index={elIdx}
                      onclick={handleElementClick}
                      ondragstart={handleElementReorderStart}
                      ondragover={handleElementDragOver}
                      ondrop={handleElementChipDrop}>
                    <button type="button" class="element-remove"
                      title="Remove" aria-label="Remove field"
                      data-section-index={idx} data-element-index={elIdx}
                      onclick={handleRemoveElement}>
                      <lightning-icon icon-name="utility:close" size="xx-small"
                        alternative-text="Remove"></lightning-icon>
                    </button>
                    <div class="element-preview-body">
                      <c-field-preview config={element}></c-field-preview>
                    </div>
                  </div>
                </template>
              </div>
            </template>

            <template if:false={section.hasElements}>
              <div class="drop-zone">
                <p class="slds-text-body_small slds-text-color_weak">
                  Drag fields here
                </p>
              </div>
            </template>
          </div>

          <!-- Nested Related Sections (repeaters inside this section) -->
          <template if:true={section.hasRelatedSections}>
            <template for:each={section.relatedSections} for:item="relSection"
                for:index="relIdx">
              <div key={relSection.id} class="related-section-card"
                  data-section-index={idx} data-related-index={relIdx}
                  onclick={handleRelatedSectionClick}>
                <div class="related-section-header">
                  <lightning-icon icon-name="standard:related_list" size="xx-small"
                    class="slds-m-right_xx-small"></lightning-icon>
                  <span class="section-title">{relSection.name}</span>
                  <span class="section-via">{relSection.repeaterInfo}</span>
                  <lightning-button-icon icon-name="utility:settings" variant="bare"
                    size="small" alternative-text="Settings"
                    data-section-index={idx} data-related-index={relIdx}
                    onclick={handleRelatedSectionSettings}>
                  </lightning-button-icon>
                  <lightning-button-icon icon-name="utility:delete" variant="bare"
                    size="small" alternative-text="Remove"
                    data-section-index={idx} data-related-index={relIdx}
                    onclick={handleDeleteRelatedSection}>
                  </lightning-button-icon>
                </div>

                <div class="related-section-body"
                    data-section-index={idx} data-related-index={relIdx}
                    ondragover={handleElementDragOver}
                    ondrop={handleRelatedElementDrop}>
                  <template if:true={relSection.hasElements}>
                    <div class="slds-grid slds-wrap slds-gutters_x-small">
                      <template for:each={relSection.elements} for:item="relEl"
                          for:index="relElIdx">
                        <div key={relEl.id} class={relEl.gridItemClass}
                            data-section-index={idx} data-related-index={relIdx}
                            data-element-index={relElIdx}
                            onclick={handleRelatedElementClick}>
                          <div class="element-preview-body">
                            <c-field-preview config={relEl}></c-field-preview>
                          </div>
                          <lightning-button-icon icon-name="utility:close" variant="bare"
                            size="xx-small" alternative-text="Remove"
                            class="element-remove"
                            data-section-index={idx} data-related-index={relIdx}
                            data-element-index={relElIdx}
                            onclick={handleRemoveRelatedElement}>
                          </lightning-button-icon>
                        </div>
                      </template>
                    </div>
                  </template>
                  <template if:false={relSection.hasElements}>
                    <div class="drop-zone drop-zone-small">
                      <p class="slds-text-body_small slds-text-color_weak">
                        Drag related object fields here
                      </p>
                    </div>
                  </template>
                </div>
              </div>
            </template>
          </template>

          <!-- Add Related List (only for parent sections) -->
          <template if:true={section.canAddRelated}>
            <div class="add-related-bar">
              <lightning-button variant="base" label="Add Related List"
                icon-name="utility:add" size="small"
                data-index={idx} onclick={handleToggleRelatedPickerForSection}>
              </lightning-button>
              <template if:true={section.showRelatedPicker}>
                <lightning-combobox
                  label="Select Related Object"
                  placeholder="Choose a child relationship..."
                  options={relationshipOptions}
                  onchange={handlePickRelationshipForSection}
                  variant="label-hidden"
                  data-index={idx}
                  class="slds-m-top_xx-small">
                </lightning-combobox>
              </template>
            </div>
          </template>
        </div>
      </template>

      <!-- Add Section -->
      <template if:true={isEditable}>
        <div class="add-section-bar">
          <lightning-button variant="neutral" label="Add Section"
            icon-name="utility:add" onclick={handleAddSection}>
          </lightning-button>
        </div>
      </template>

      <!-- Empty state -->
      <template if:false={hasSections}>
        <div class="empty-canvas" ondragover={handleSectionDragOver}
            ondrop={handleSectionDrop}>
          <div class="empty-canvas__illu">
            <lightning-icon icon-name="utility:layout" size="large"></lightning-icon>
          </div>
          <p class="slds-text-heading_small empty-canvas__title">
            Start building your form
          </p>
          <p class="slds-text-body_small slds-text-color_weak empty-canvas__sub">
            Three steps to your first form
          </p>
          <ol class="empty-steps">
            <li class="empty-step">
              <span class="empty-step__num">1</span>
              <lightning-icon icon-name="utility:add" size="x-small"
                class="empty-step__ico"></lightning-icon>
              <span>Add a section</span>
            </li>
            <li class="empty-step">
              <span class="empty-step__num">2</span>
              <lightning-icon icon-name="utility:drag_and_drop" size="x-small"
                class="empty-step__ico"></lightning-icon>
              <span>Drag fields in from the left</span>
            </li>
            <li class="empty-step">
              <span class="empty-step__num">3</span>
              <lightning-icon icon-name="utility:settings" size="x-small"
                class="empty-step__ico"></lightning-icon>
              <span>Fine-tune each field on the right</span>
            </li>
          </ol>
        </div>
      </template>
    </div>
    </div>
  </div>
</template>
