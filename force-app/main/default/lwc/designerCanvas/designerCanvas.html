<template>
  <div class="canvas-container">
    <!-- Sections -->
    <template for:each={sections} for:item="section" for:index="idx">
      <div
        key={section.id}
        class={section.cardClass}
        data-index={idx}
        onclick={handleSectionClick}
        ondragover={handleSectionDragOver}
        ondrop={handleSectionDrop}
      >
        <!-- Section Header -->
        <div class="section-header">
          <div class="section-header-left">
            <lightning-icon
              icon-name="utility:drag_and_drop"
              size="xx-small"
              class="drag-handle slds-m-right_xx-small"
              alternative-text="Drag"
            ></lightning-icon>
            <span class="section-title">{section.name}</span>
            <template if:true={section.isRepeatable}>
              <lightning-badge label="Repeater" class="slds-m-left_xx-small">
              </lightning-badge>
            </template>
          </div>
          <div class="section-header-right">
            <lightning-button-icon
              icon-name="utility:settings"
              variant="bare"
              size="small"
              alternative-text="Section settings"
              data-index={idx}
              onclick={handleSectionSettings}
            >
            </lightning-button-icon>
            <lightning-button-icon
              icon-name="utility:delete"
              variant="bare"
              size="small"
              alternative-text="Delete section"
              data-index={idx}
              onclick={handleDeleteSection}
            >
            </lightning-button-icon>
          </div>
        </div>

        <!-- Elements in this section -->
        <div
          class="section-body"
          data-section-index={idx}
          ondragover={handleElementDragOver}
          ondrop={handleElementDrop}
        >
          <template if:true={section.hasElements}>
            <div class={section.gridClass}>
              <template
                for:each={section.elements}
                for:item="element"
                for:index="elIdx"
              >
                <div
                  key={element.id}
                  class="element-chip"
                  draggable="true"
                  data-section-index={idx}
                  data-element-index={elIdx}
                  onclick={handleElementClick}
                  ondragstart={handleElementReorderStart}
                >
                  <lightning-icon
                    icon-name={element.iconName}
                    size="xx-small"
                    class="slds-m-right_xx-small"
                  ></lightning-icon>
                  <span class="element-label">{element.label}</span>
                  <template if:true={element.required}>
                    <abbr class="slds-required" title="required">*</abbr>
                  </template>
                  <lightning-button-icon
                    icon-name="utility:close"
                    variant="bare"
                    size="xx-small"
                    alternative-text="Remove"
                    class="element-remove"
                    data-section-index={idx}
                    data-element-index={elIdx}
                    onclick={handleRemoveElement}
                  >
                  </lightning-button-icon>
                </div>
              </template>
            </div>
          </template>

          <!-- Empty drop zone -->
          <template if:false={section.hasElements}>
            <div class="drop-zone">
              <p class="slds-text-body_small slds-text-color_weak">
                Drag fields here
              </p>
            </div>
          </template>
        </div>
      </div>
    </template>

    <!-- Add Section Button -->
    <template if:true={isEditable}>
      <div class="slds-text-align_center slds-m-top_small">
        <lightning-button
          variant="neutral"
          label="Add Section"
          icon-name="utility:add"
          onclick={handleAddSection}
        >
        </lightning-button>
      </div>
    </template>

    <!-- Empty state -->
    <template if:false={hasSections}>
      <div
        class="empty-canvas"
        ondragover={handleSectionDragOver}
        ondrop={handleSectionDrop}
      >
        <lightning-icon
          icon-name="utility:layout"
          size="large"
          class="slds-m-bottom_small"
        ></lightning-icon>
        <p class="slds-text-heading_small slds-m-bottom_x-small">
          Start building your form
        </p>
        <p class="slds-text-body_small slds-text-color_weak">
          Add a section, then drag fields from the left panel.
        </p>
      </div>
    </template>
  </div>
</template>
