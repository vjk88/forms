<template>
    <template lwc:if={loading}>
        <div class="st-center">
            <lightning-spinner
                alternative-text="Loading the studio"
                size="medium"
            ></lightning-spinner>
        </div>
    </template>
    <template lwc:elseif={notFound}>
        <div class="st-center st-notfound">
            <h2>This form isn't available</h2>
            <p>
                It may have been deleted, or you may not have access. Pick a
                form from the library to keep working.
            </p>
            <button type="button" class="st-primary" onclick={handleExit}>
                Go to Forms
            </button>
        </div>
    </template>
    <template lwc:elseif={spec}>
        <header class="st-bar">
            <button type="button" class="st-exit" onclick={handleExit}>
                ← Exit
            </button>
            <span class="st-name">{formName}</span>
            <template lwc:if={hasVersions}>
                <select
                    class="st-verselect"
                    aria-label="Form version"
                    onchange={handleVersionChange}
                >
                    <template for:each={versionOptions} for:item="o">
                        <option key={o.id} value={o.id} selected={o.selected}>
                            {o.label}
                        </option>
                    </template>
                </select>
            </template>
            <template lwc:else>
                <span class="st-chip">{versionChip}</span>
            </template>
            <div class="st-modes">
                <button
                    type="button"
                    class={buildClass}
                    aria-pressed={isBuildPressed}
                    disabled={isReadOnly}
                    onclick={handleModeBuild}
                >
                    Build
                </button>
                <button
                    type="button"
                    class={designClass}
                    aria-pressed={isDesignPressed}
                    disabled={isReadOnly}
                    onclick={handleModeDesign}
                >
                    Design
                </button>
            </div>
            <template lwc:if={isEditable}>
                <span class="st-saved">{savedText}</span>
            </template>
            <template lwc:else>
                <span class="st-robadge">🔒 {readOnlyBadge}</span>
                <button
                    type="button"
                    class="st-rolink"
                    onclick={handleBackToEditable}
                >
                    {backToEditableLabel}
                </button>
            </template>
            <span class="st-spacer"></span>
            <button
                type="button"
                class="st-icon"
                title="Undo isn't available yet"
                disabled
            >
                ↶
            </button>
            <button
                type="button"
                class="st-icon"
                title="Redo isn't available yet"
                disabled
            >
                ↷
            </button>
            <button
                type="button"
                class="st-primary"
                onclick={handlePublish}
                disabled={publishDisabled}
            >
                Publish
            </button>
        </header>

        <div class="st-body">
            <template lwc:if={isReadOnly}>
                <aside class="st-left st-left--notice">
                    <div class="st-notice">
                        <h3 class="st-notice-title">{readOnlyTitle}</h3>
                        <p class="st-notice-text">{readOnlyText}</p>
                        <button
                            type="button"
                            class="st-primary st-notice-btn"
                            onclick={handleBackToEditable}
                        >
                            {backToEditableLabel}
                        </button>
                    </div>
                </aside>
                <main class="st-stagearea">
                    <div class="st-scroll">
                        <c-final-form-viewer
                            spec={viewSpec}
                        ></c-final-form-viewer>
                    </div>
                </main>
            </template>
            <template lwc:elseif={isDesign}>
                <aside class="st-left">
                    <c-final-design-panel
                        spec={spec}
                        onspecchange={handleSpecChange}
                        onthemeedit={handleThemeEdit}
                    ></c-final-design-panel>
                </aside>
                <main class="st-stagearea">
                    <div class="st-scroll">
                        <c-final-form-viewer spec={spec}></c-final-form-viewer>
                    </div>
                </main>
            </template>
            <template lwc:else>
                <aside class="st-left st-left--build">
                    <template lwc:if={showProperties}>
                        <div class="st-props">
                            <button
                                type="button"
                                class="st-back"
                                onclick={handleBackToPalette}
                            >
                                ‹ Fields
                            </button>
                            <h3 class="st-props-title">{selectionLabel}</h3>
                            <p class="st-props-hint">
                                Property editing is coming soon. Your selection
                                is highlighted on the blueprint.
                            </p>
                        </div>
                    </template>
                    <template lwc:else>
                        <c-final-field-palette
                            object-api={objectApi}
                            used-fields={usedFields}
                            onaddfield={handleAddField}
                        ></c-final-field-palette>
                    </template>
                </aside>
                <main class="st-blueprint">
                    <c-final-builder-canvas
                        spec={spec}
                        selection={selection}
                        current-page-index={buildPageIndex}
                        onselect={handleSelect}
                        onpagechange={handleBuildPageChange}
                        onaddpage={handleAddPage}
                        onaddsection={handleAddSection}
                        onremoveelement={handleRemoveElement}
                        onremovesection={handleRemoveSection}
                        onremovepage={handleRemovePage}
                    ></c-final-builder-canvas>
                </main>
                <aside class="st-buildpreview">
                    <div class="st-scroll">
                        <c-final-form-viewer spec={spec}></c-final-form-viewer>
                    </div>
                </aside>
            </template>
        </div>

        <template lwc:if={editorOpen}>
            <c-final-theme-editor
                theme-id={editorThemeId}
                start-from={editorStartFrom}
                onsave={handleThemeSaved}
                oncancel={handleEditorCancel}
            ></c-final-theme-editor>
        </template>
    </template>
</template>
