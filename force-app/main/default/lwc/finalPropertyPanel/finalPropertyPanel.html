<template>
    <div class="pp">
        <header class="pp-head">
            <h3 class="pp-title">{title}</h3>
            <p class="pp-sub">{subtitle}</p>
        </header>

        <!-- FIELD (BUILDER_SURFACES §2 — the legacy surface, minus prefill) -->
        <template lwc:if={isField}>
            <div class="pp-group">
                <lightning-input
                    label="Label"
                    data-prop="label"
                    value={n.label}
                    onchange={handleLabel}
                ></lightning-input>

                <div class="pp-fld">
                    <span class="pp-label">Behavior</span>
                    <div class="pp-seg">
                        <template for:each={behaviorSeg} for:item="b">
                            <button
                                key={b.value}
                                type="button"
                                class={b.cls}
                                data-value={b.value}
                                onclick={handleBehavior}
                            >
                                {b.label}
                            </button>
                        </template>
                    </div>
                </div>

                <template lwc:if={hasRenderAsChoices}>
                    <label class="pp-label" for="renderas">Display as</label>
                    <select
                        id="renderas"
                        class="pp-select pp-renderas"
                        onchange={handleRenderAs}
                    >
                        <template for:each={renderAsOptions} for:item="o">
                            <option
                                key={o.value}
                                value={o.value}
                                selected={o.selected}
                            >
                                {o.label}
                            </option>
                        </template>
                    </select>
                </template>

                <template lwc:if={showOptionsEditor}>
                    <div class="pp-fld">
                        <span class="pp-label">Options</span>
                        <template for:each={optionRows} for:item="o">
                            <div key={o.key} class="pp-optrow">
                                <input
                                    type="text"
                                    class="pp-input"
                                    placeholder="Label"
                                    value={o.label}
                                    data-index={o.index}
                                    data-field="label"
                                    onchange={handleOptionChange}
                                />
                                <input
                                    type="text"
                                    class="pp-input"
                                    placeholder="Value"
                                    value={o.value}
                                    data-index={o.index}
                                    data-field="value"
                                    onchange={handleOptionChange}
                                />
                                <button
                                    type="button"
                                    class="pp-x"
                                    title="Remove option"
                                    data-index={o.index}
                                    onclick={handleRemoveOption}
                                >
                                    ×
                                </button>
                            </div>
                        </template>
                        <button
                            type="button"
                            class="pp-add"
                            onclick={handleAddOption}
                        >
                            + Add option
                        </button>
                    </div>
                </template>

                <template lwc:if={isSlider}>
                    <div class="pp-fld">
                        <span class="pp-label">Slider range</span>
                        <div class="pp-numrow">
                            <input
                                type="number"
                                class="pp-input"
                                title="Min"
                                placeholder="Min"
                                value={slider.min}
                                data-param="min"
                                onchange={handleSlider}
                            />
                            <input
                                type="number"
                                class="pp-input"
                                title="Max"
                                placeholder="Max"
                                value={slider.max}
                                data-param="max"
                                onchange={handleSlider}
                            />
                            <input
                                type="number"
                                class="pp-input"
                                title="Step"
                                placeholder="Step"
                                value={slider.step}
                                data-param="step"
                                onchange={handleSlider}
                            />
                        </div>
                    </div>
                </template>

                <lightning-input
                    label="Help text"
                    data-prop="help"
                    value={n.help}
                    field-level-help="Shows as an info bubble beside the label"
                    onchange={handleHelp}
                ></lightning-input>
                <lightning-input
                    label="Placeholder"
                    data-prop="placeholder"
                    value={n.placeholder}
                    onchange={handlePlaceholder}
                ></lightning-input>
            </div>

            <div class="pp-group">
                <h4 class="pp-grouptitle">Checks</h4>
                <c-final-validation-editor
                    entries={extraValidation}
                    sources={compareSources}
                    onvalidationchange={handleValidationChange}
                ></c-final-validation-editor>
            </div>
        </template>

        <!-- DISPLAY TEXT -->
        <template lwc:elseif={isRichText}>
            <div class="pp-group">
                <lightning-input
                    label="Label"
                    data-prop="label"
                    value={n.label}
                    onchange={handleLabel}
                ></lightning-input>
                <lightning-input-rich-text
                    label="Text"
                    data-prop="html"
                    label-visible
                    value={cfg.html}
                    onchange={handleRichText}
                ></lightning-input-rich-text>
            </div>
        </template>

        <!-- IMAGE (upload-only — owner 2026-07-10) -->
        <template lwc:elseif={isImage}>
            <div class="pp-group">
                <lightning-input
                    label="Label"
                    data-prop="label"
                    value={n.label}
                    onchange={handleLabel}
                ></lightning-input>
                <div class="pp-fld">
                    <span class="pp-label">Image</span>
                    <template lwc:if={hasImageSrc}>
                        <div class="pp-thumb">
                            <img src={cfg.src} alt={cfg.alt} />
                        </div>
                    </template>
                    <div class="pp-mediarow">
                        <label class="pp-upload">
                            <input
                                type="file"
                                accept="image/png,image/jpeg,image/gif,image/webp"
                                disabled={uploading}
                                onchange={handleImageUpload}
                            />
                            {uploadLabel}
                        </label>
                        <template lwc:if={hasImageSrc}>
                            <button
                                type="button"
                                class="pp-remove"
                                onclick={handleImageRemove}
                            >
                                Remove
                            </button>
                        </template>
                    </div>
                    <template lwc:if={uploadError}>
                        <p class="pp-error" role="alert">{uploadError}</p>
                    </template>
                </div>
                <lightning-input
                    label="Alt text"
                    data-prop="alt"
                    value={cfg.alt}
                    field-level-help="Read by screen readers; shown if the image can't load"
                    onchange={handleImageAlt}
                ></lightning-input>
                <div class="pp-fld">
                    <span class="pp-label">Size</span>
                    <div class="pp-seg">
                        <template for:each={imageSizeSeg} for:item="o">
                            <button
                                key={o.value}
                                type="button"
                                class={o.cls}
                                data-value={o.value}
                                onclick={handleImageSize}
                            >
                                {o.label}
                            </button>
                        </template>
                    </div>
                </div>
            </div>
        </template>

        <!-- CALLOUT -->
        <template lwc:elseif={isCallout}>
            <div class="pp-group">
                <lightning-input
                    label="Label"
                    data-prop="label"
                    value={n.label}
                    onchange={handleLabel}
                ></lightning-input>
                <div class="pp-fld">
                    <span class="pp-label">Tone</span>
                    <div class="pp-seg">
                        <template for:each={calloutToneSeg} for:item="o">
                            <button
                                key={o.value}
                                type="button"
                                class={o.cls}
                                data-value={o.value}
                                onclick={handleCalloutTone}
                            >
                                {o.label}
                            </button>
                        </template>
                    </div>
                </div>
                <lightning-input-rich-text
                    label="Message"
                    data-prop="html"
                    label-visible
                    value={cfg.html}
                    onchange={handleRichText}
                ></lightning-input-rich-text>
            </div>
        </template>

        <!-- SPACER -->
        <template lwc:elseif={isSpacer}>
            <div class="pp-group">
                <div class="pp-fld">
                    <span class="pp-label">Size</span>
                    <div class="pp-seg">
                        <template for:each={spacerSizeSeg} for:item="o">
                            <button
                                key={o.value}
                                type="button"
                                class={o.cls}
                                data-value={o.value}
                                onclick={handleSpacerSize}
                            >
                                {o.label}
                            </button>
                        </template>
                    </div>
                </div>
            </div>
        </template>

        <!-- CONSENT -->
        <template lwc:elseif={isConsent}>
            <div class="pp-group">
                <lightning-input
                    label="Label"
                    data-prop="label"
                    value={n.label}
                    onchange={handleLabel}
                ></lightning-input>
                <lightning-input-rich-text
                    label="Consent text"
                    data-prop="html"
                    label-visible
                    value={cfg.html}
                    onchange={handleRichText}
                ></lightning-input-rich-text>
                <div class="pp-fld">
                    <span class="pp-label">Acceptance</span>
                    <div class="pp-seg">
                        <template for:each={consentSeg} for:item="o">
                            <button
                                key={o.value}
                                type="button"
                                class={o.cls}
                                data-value={o.value}
                                onclick={handleConsentToggle}
                            >
                                {o.label}
                            </button>
                        </template>
                    </div>
                </div>
            </div>
        </template>

        <!-- DIVIDER -->
        <template lwc:elseif={isDivider}>
            <p class="pp-hint pp-only">
                A divider has no settings — its look comes from the form theme.
            </p>
        </template>

        <!-- FILE UPLOAD -->
        <template lwc:elseif={isFile}>
            <div class="pp-group">
                <lightning-input
                    label="Label"
                    data-prop="label"
                    value={n.label}
                    onchange={handleLabel}
                ></lightning-input>
                <p class="pp-hint">
                    Respondents attach files when they submit. The label above
                    is what they&#8217;ll see.
                </p>
            </div>
        </template>

        <!-- EMPTY SPACE -->
        <template lwc:elseif={isEmptySpace}>
            <template lwc:if={showEmptySpaceNote}>
                <p class="pp-hint pp-only">
                    Empty space fills a grid cell — give its section more than
                    one column to size it.
                </p>
            </template>
        </template>

        <!-- REPEATING GROUP (§4: DEDICATED — never plain section props) -->
        <template lwc:elseif={isRepeater}>
            <div class="pp-group">
                <lightning-input
                    label="Group title"
                    data-prop="title"
                    value={n.title}
                    onchange={handleTitle}
                ></lightning-input>
                <div class="pp-fld">
                    <span class="pp-label">Child records</span>
                    <span class="pp-ro">{repeat.childObject}</span>
                </div>
                <div class="pp-fld">
                    <span class="pp-label">Display style</span>
                    <div class="pp-seg">
                        <template for:each={repeatStyleSeg} for:item="o">
                            <button
                                key={o.value}
                                type="button"
                                class={o.cls}
                                data-value={o.value}
                                onclick={handleRepeatStyle}
                            >
                                {o.label}
                            </button>
                        </template>
                    </div>
                </div>
                <lightning-input
                    label="Add-button label"
                    data-prop="addlabel"
                    value={repeat.addLabel}
                    onchange={handleAddLabel}
                ></lightning-input>
                <div class="pp-minmax">
                    <lightning-input
                        type="number"
                        label="Min rows"
                        data-prop="min"
                        value={repeat.min}
                        min="0"
                        onchange={handleMin}
                    ></lightning-input>
                    <lightning-input
                        type="number"
                        label="Max rows (0 = unlimited)"
                        data-prop="max"
                        value={repeat.max}
                        min="0"
                        onchange={handleMax}
                    ></lightning-input>
                </div>
            </div>

            <div class="pp-group">
                <h4 class="pp-grouptitle">{childHeading}</h4>
                <p class="pp-hint">
                    Click a field to add it to every entry of this group.
                </p>
                <template lwc:if={childError}>
                    <p class="pp-error" role="alert">{childError}</p>
                </template>
                <template lwc:elseif={childLoading}>
                    <lightning-spinner
                        alternative-text="Loading child fields"
                        size="small"
                    ></lightning-spinner>
                </template>
                <ul class="pp-childlist">
                    <template for:each={childRows} for:item="f">
                        <li key={f.apiName}>
                            <button
                                type="button"
                                class={f.cls}
                                title={f.title}
                                data-api={f.apiName}
                                onclick={handleAddChildField}
                            >
                                <span class="pp-childlabel">
                                    <template lwc:if={f.required}>
                                        <abbr class="pp-req" title="required"
                                            >*</abbr
                                        >
                                    </template>
                                    {f.label}
                                </span>
                                <span class="pp-childtype">{f.inputType}</span>
                                <template lwc:if={f.added}>
                                    <span class="pp-added">ADDED</span>
                                </template>
                            </button>
                        </li>
                    </template>
                </ul>
            </div>
        </template>

        <!-- SECTION (BUILDER_SURFACES §3 — the legacy surface) -->
        <template lwc:elseif={isSection}>
            <div class="pp-group">
                <lightning-input
                    label="Title"
                    data-prop="title"
                    value={n.title}
                    onchange={handleTitle}
                ></lightning-input>

                <div class="pp-fld">
                    <span class="pp-label">Columns</span>
                    <div class="pp-seg">
                        <template for:each={columnsSeg} for:item="o">
                            <button
                                key={o.value}
                                type="button"
                                class={o.cls}
                                data-value={o.value}
                                onclick={handleColumns}
                            >
                                {o.label}
                            </button>
                        </template>
                    </div>
                </div>

                <div class="pp-fld">
                    <span class="pp-label">Header</span>
                    <button
                        type="button"
                        class={headerToggleClass}
                        onclick={handleHeaderToggle}
                    >
                        {headerToggleLabel}
                    </button>
                </div>

                <template lwc:if={showHeader}>
                    <div class="pp-fld">
                        <span class="pp-label">Header icon</span>
                        <div class="pp-icsearch">
                            <input
                                type="text"
                                class="pp-input"
                                placeholder="Search icons…"
                                value={iconSearch}
                                oninput={handleIconSearch}
                            />
                            <template lwc:if={hasIcon}>
                                <button
                                    type="button"
                                    class="pp-remove"
                                    title="Clear icon"
                                    onclick={handleClearIcon}
                                >
                                    Clear
                                </button>
                            </template>
                        </div>
                        <div class="pp-icgrid">
                            <template for:each={iconChoices} for:item="ic">
                                <button
                                    key={ic.key}
                                    type="button"
                                    class={ic.cls}
                                    data-icon={ic.name}
                                    title={ic.name}
                                    onclick={handleSelectIcon}
                                >
                                    <lightning-icon
                                        icon-name={ic.name}
                                        size="x-small"
                                    ></lightning-icon>
                                </button>
                            </template>
                        </div>
                    </div>
                </template>

                <lightning-textarea
                    label="Description"
                    data-prop="description"
                    value={n.description}
                    onchange={handleDescription}
                ></lightning-textarea>

                <div class="pp-fld">
                    <span class="pp-label">Collapsible</span>
                    <button
                        type="button"
                        class={collapsibleClass}
                        onclick={handleCollapsibleToggle}
                    >
                        {collapsibleLabel}
                    </button>
                </div>
                <template lwc:if={collapsible}>
                    <div class="pp-fld">
                        <span class="pp-label">Default state</span>
                        <button
                            type="button"
                            class={collapsedDefaultClass}
                            onclick={handleCollapsedDefaultToggle}
                        >
                            {collapsedDefaultLabel}
                        </button>
                    </div>
                </template>
            </div>
        </template>

        <!-- PAGE -->
        <template lwc:elseif={isPage}>
            <div class="pp-group">
                <lightning-input
                    label="Page name"
                    data-prop="pagename"
                    value={n.name}
                    onchange={handlePageName}
                ></lightning-input>
            </div>
        </template>

        <!-- forward-compat: unknown element types stay honest -->
        <template lwc:elseif={isOtherElement}>
            <p class="pp-hint pp-only">
                This element type doesn&#8217;t have an editor yet.
            </p>
        </template>

        <!-- Width — legacy showWidth: only inside a multi-column section -->
        <template lwc:if={showWidth}>
            <div class="pp-group">
                <div class="pp-fld">
                    <span class="pp-label">Width</span>
                    <div class="pp-seg">
                        <template for:each={widthSeg} for:item="o">
                            <button
                                key={o.value}
                                type="button"
                                class={o.cls}
                                data-value={o.value}
                                onclick={handleWidth}
                            >
                                {o.label}
                            </button>
                        </template>
                    </div>
                </div>
            </div>
        </template>

        <!-- Standalone block framing (legacy: never for plain-only types) -->
        <template lwc:if={showBlockStyle}>
            <div class="pp-group">
                <div class="pp-fld">
                    <span class="pp-label">Block style</span>
                    <div class="pp-seg">
                        <template for:each={blockStyleSeg} for:item="o">
                            <button
                                key={o.value}
                                type="button"
                                class={o.cls}
                                data-value={o.value}
                                onclick={handleBlockStyle}
                            >
                                {o.label}
                            </button>
                        </template>
                    </div>
                </div>
            </div>
        </template>

        <!-- Visibility renders on EVERY inspector (owner ruling: rules live
             on the properties; the Logic rail is just the index) -->
        <div class="pp-group">
            <h4 class="pp-grouptitle">Visibility</h4>
            <c-final-rule-editor
                value={n.visibility}
                sources={ruleSources}
                source-index={ruleIndex}
                host-repeat-section-id={hostRepeatSectionId}
                noun={ruleNoun}
                onrulechange={handleRuleChange}
            ></c-final-rule-editor>
        </div>
    </div>
</template>
